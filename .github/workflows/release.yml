name: Release Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Write OpenRouter runtime key file
        env:
          OPENROUTER_API_KEY: ${{ secrets['OPENROUTER_API_KEY'] }}
        run: |
          echo "// Generated in CI. Do not commit secrets in source." > src/config/ai.runtime.ts
          echo "export const RUNTIME_OPENROUTER_API_KEY = '${OPENROUTER_API_KEY}';" >> src/config/ai.runtime.ts

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build release APK
        working-directory: android
        run: bash ./gradlew assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vuim-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true

      - name: Authenticate to Google Cloud for FCM
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Send FCM topic notification
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FCM_TOPIC: vuim_updates
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          curl -X POST "https://fcm.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/messages:send" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json; UTF-8" \
            -d "{\"message\":{\"topic\":\"${FCM_TOPIC}\",\"notification\":{\"title\":\"VUIM Update Available\",\"body\":\"New version ${RELEASE_TAG} is now live. Tap to update.\"},\"android\":{\"priority\":\"HIGH\"},\"data\":{\"releaseTag\":\"${RELEASE_TAG}\",\"releaseUrl\":\"${RELEASE_URL}\"}}}"