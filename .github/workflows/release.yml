name: Release Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build release APK
        working-directory: android
        run: bash ./gradlew assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vuim-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true

      - name: Trigger release notification webhook
        if: ${{ secrets.RELEASE_NOTIFY_WEBHOOK_URL != '' }}
        env:
          RELEASE_NOTIFY_WEBHOOK_URL: ${{ secrets.RELEASE_NOTIFY_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ github.ref_name }}
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          curl -X POST "$RELEASE_NOTIFY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"tag\":\"$RELEASE_TAG\",\"version\":\"$RELEASE_VERSION\",\"repository\":\"$RELEASE_REPO\",\"releaseUrl\":\"$RELEASE_URL\"}"

      - name: Authenticate to Google Cloud for FCM
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' && secrets.FIREBASE_PROJECT_ID != '' && secrets.FCM_TOPIC != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud SDK
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' && secrets.FIREBASE_PROJECT_ID != '' && secrets.FCM_TOPIC != '' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Send FCM topic notification
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' && secrets.FIREBASE_PROJECT_ID != '' && secrets.FCM_TOPIC != '' }}
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FCM_TOPIC: ${{ secrets.FCM_TOPIC }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          curl -X POST "https://fcm.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/messages:send" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json; UTF-8" \
            -d "{\"message\":{\"topic\":\"${FCM_TOPIC}\",\"notification\":{\"title\":\"VUIM Update Available\",\"body\":\"New version ${RELEASE_TAG} is now live. Tap to update.\"},\"android\":{\"priority\":\"HIGH\"},\"data\":{\"releaseTag\":\"${RELEASE_TAG}\",\"releaseUrl\":\"${RELEASE_URL}\"}}}"