name: Release Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build release APK
        working-directory: android
        run: bash ./gradlew assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vuim-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true

      - name: Trigger release notification webhook
        if: ${{ secrets.RELEASE_NOTIFY_WEBHOOK_URL != '' }}
        env:
          RELEASE_NOTIFY_WEBHOOK_URL: ${{ secrets.RELEASE_NOTIFY_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ github.ref_name }}
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          curl -X POST "$RELEASE_NOTIFY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"tag\":\"$RELEASE_TAG\",\"version\":\"$RELEASE_VERSION\",\"repository\":\"$RELEASE_REPO\",\"releaseUrl\":\"$RELEASE_URL\"}"